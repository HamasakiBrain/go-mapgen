name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile binaries
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            export GOOS=${t%/*} GOARCH=${t#*/}
            name="go-mapgen_${VERSION}_${GOOS}_${GOARCH}"
            bin="go-mapgen"
            [ "$GOOS" = windows ] && bin="go-mapgen.exe"
            echo "→ building $name"
            go build -trimpath -ldflags "-s -w" -o "dist/$bin" .
            if [ "$GOOS" = windows ]; then
              (cd dist && zip -q "${name}.zip" "$bin" && rm "$bin")
            else
              (cd dist && tar czf "${name}.tar.gz" "$bin" && rm "$bin")
            fi
          done
          (cd dist && sha256sum go-mapgen_* > checksums.txt)
          echo "=== checksums.txt ==="; cat dist/checksums.txt
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Установка

            Скачай архив под свою ОС из списка ниже, распакуй и запусти `go-mapgen` — Go не нужен.

            **macOS / Linux**
            ```bash
            tar xzf go-mapgen_*_<os>_<arch>.tar.gz
            ./go-mapgen -path /путь/к/проекту            # отчёты json/md/html/dot
            ./go-mapgen -path /путь/к/проекту -web        # дашборд на http://localhost:8080
            ```

            **Windows** — распакуй `.zip` и запусти `go-mapgen.exe` из PowerShell.

            **Через Go:** `go install github.com/HamasakiBrain/go-mapgen@${{ github.ref_name }}`

            Проверка целостности: `sha256sum -c checksums.txt`
